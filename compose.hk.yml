services:
  ombre-brain:
    build: .
    container_name: ombre-brain
    restart: unless-stopped
    command: ["python", "server.py"]
    env_file:
      - .env
    environment:
      OMBRE_TRANSPORT: streamable-http
      OMBRE_BUCKETS_DIR: /data
    ports:
      - "18001:8000"
    volumes:
      - /srv/ombre-brain/buckets:/data
      - /srv/ombre-brain/config.yaml:/app/config.yaml:ro

  ombre-gateway:
    build: .
    container_name: ombre-gateway
    restart: unless-stopped
    command: ["python", "gateway.py"]
    env_file:
      - .env
    environment:
      OMBRE_TRANSPORT: streamable-http
      OMBRE_BUCKETS_DIR: /data
    ports:
      - "18002:8010"
    volumes:
      - /srv/ombre-brain/buckets:/data
      - /srv/ombre-brain/config.yaml:/app/config.yaml:ro
