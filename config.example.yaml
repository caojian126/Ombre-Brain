  time_proximity: 1.5
  importance: 1.0

# --- Fuzzy matching ---
matching:
  fuzzy_threshold: 50
  max_results: 5

# --- Obsidian wikilinks ---
wikilink:
  enabled: true
  use_tags: false
  use_domain: true
  use_auto_keywords: true
  auto_top_k: 4
  min_keyword_len: 3
  exclude_keywords: []
