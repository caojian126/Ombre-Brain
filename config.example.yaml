# --- Memory Diffusion ---
memory_diffusion:
  enabled: true
  max_hops: 2
  top_k: 4
  min_activation: 0.18
  hop_decays: [0.8, 0.6, 0.4, 0.25]
  decay: 0.55
  include_incoming: true
  max_paths_per_hit: 3

# --- Node Facets ---
node_facets:
  enabled: true
  store: "sqlite"
  salience_min: 0.2
  salience_max: 1.3

# --- Memory Relevance ---
memory_relevance:
